# ICCAD Problem A – LLM config (Section 6.2)
# Rename to config.yaml and set your API keys for evaluation.

provider: "openai"   # or: "anthropic"
openai:
  api_key: <YOUR_API_KEY>
  model: "gpt-4o-mini"
anthropic:
  api_key: <YOUR_API_KEY>
  model: "claude-haiku-4-5"
generation:
  temperature: 0.2
  max_output_tokens: 4096
